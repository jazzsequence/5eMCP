name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    name: Lint, typecheck, and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  build-mcpb:
    name: Build .mcpb bundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      # Full install first (tsc is in devDependencies), then prune to prod-only
      # before packing so node_modules in the bundle stays small.
      - name: Install all dependencies and build
        run: npm ci && npm run build

      - name: Prune to production dependencies
        run: npm ci --omit=dev

      - name: Pack .mcpb bundle
        run: npx --yes @anthropic-ai/mcpb pack . 5eMCP.mcpb

      - name: Validate bundle
        run: npx @anthropic-ai/mcpb validate manifest.json

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v7
        with:
          name: 5eMCP-mcpb
          path: 5eMCP.mcpb
          retention-days: 5

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-mcpb
    permissions:
      contents: write
    steps:
      - name: Download .mcpb artifact
        uses: actions/download-artifact@v8
        with:
          name: 5eMCP-mcpb

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Installation

            ### Claude Desktop (one-click)
            Download `5eMCP.mcpb` below and open it, or go to **Settings → Extensions → Install Extension** in Claude Desktop and select the file.

            ### Claude Code / developers
            ```bash
            git clone https://github.com/jazzsequence/5eMCP.git
            cd 5eMCP
            npm install
            npm run build
            ```
            Then add to `~/.claude.json`:
            ```json
            {
              "mcpServers": {
                "5etools": {
                  "command": "node",
                  "args": ["/path/to/5eMCP/dist/index.js"],
                  "env": { "GITHUB_TOKEN": "ghp_your_token_here" }
                }
              }
            }
            ```

            See the [README](https://github.com/jazzsequence/5eMCP#readme) for full documentation.
          files: 5eMCP.mcpb
          draft: false
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') }}
          generate_release_notes: true
